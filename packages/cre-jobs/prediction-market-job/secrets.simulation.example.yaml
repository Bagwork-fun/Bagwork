# Copy to secrets.yaml (or rely on Hardhat deploy, which writes the same shape).
# Chainlink CRE simulation loads secret VALUES from your shell / prediction-market-job/.env —
# not from inline `value:` fields.
#
# .env must define:
#   GEMINI_API_KEY=...
#   PRIVATE_KEY=0x...   (optional unless using simulate --broadcast)
secretsNames:
  GEMINI_API_KEY:
    - GEMINI_API_KEY
  PRIVATE_KEY:
    - PRIVATE_KEY
